      explain:"复发常见诱因为食复（饮食不当）、劳复（过劳或早犯房事）、药复（用药不当）、重感新邪；体质偏阳属易感性/从化因素，不属于复发诱因，是干扰项。" },
    { id:"q41", ch:"fabing", type:"A1", stem:"徐发与伏而后发的主要区别是：",
      options:[["A","徐发有明确潜伏期，伏而后发无潜伏期"],["B","徐发是渐进性缓慢起病过程，伏而后发是邪气潜伏后突然发病"],
                ["C","徐发病情重，伏而后发病情轻"],["D","徐发见于外感病，伏而后发只见于内伤病"],["E","二者没有区别"]],
      answer:["B"], tag:"徐发与伏而后发辨析",
      explain:"徐发没有潜伏期概念，是渐进性缓慢起病；伏而后发有明确潜伏期，邪气潜伏后突然发作，二者常被出题人互换设错。" },

    // ---- 变式题（专供"复盘"，不重复原题面）----
    { id:"v6a", ch:"yinyang", type:"A1", stem:'"阳中之阴"指的是：',
      options:[["A","心"],["B","肺"],["C","肝"],["D","脾"],["E","肾"]],
      answer:["B"], tag:"五脏阴阳属性归类",
      explain:"肺居上属阳，但肺属金主肃降、性偏凉润，为阳中之阴；心才是阳中之阳。" , variant:true},
    { id:"v6b", ch:"yinyang", type:"A1", stem:"就五脏阴阳属性而言，肾归属于：",
      options:[["A","阳中之阳"],["B","阳中之阴"],["C","阴中之阳"],["D","阴中之至阴"],["E","阴中之阴"]],
      answer:["E"], tag:"五脏阴阳属性归类",
      explain:'肾位居下属阴，主藏精、性属水，为"阴中之阴"；"阴中之至阴"专指脾。', variant:true },
    { id:"v7a", ch:"yinyang", type:"A1", stem:'"滋水涵木法"适用于下列何证：',
      options:[["A","脾肾阳虚证"],["B","肾阴亏虚，肝阴不足证"],["C","心肾不交证"],["D","肺肾阴虚证"],["E","肝郁脾虚证"]],
      answer:["B"], tag:"五行相生治法（益火补土等）脏腑指向",
      explain:"滋水涵木＝滋肾阴以养肝阴，用于肾阴亏虚不能滋养肝阴导致的肝阴不足证。", variant:true },
    { id:"v7b", ch:"yinyang", type:"A1", stem:'"培土生金法"体现的是哪两脏之间的相生关系：',
      options:[["A","心生脾"],["B","脾生肺"],["C","肺生肾"],["D","肾生肝"],["E","肝生心"]],
      answer:["B"], tag:"五行相生治法（益火补土等）脏腑指向",
      explain:"培土生金＝补脾益气以助肺气，体现脾土生肺金的相生关系。", variant:true },
    { id:"v12a", ch:"jingqi", type:"A1", stem:'引起"气随津脱"的常见病因是：',
      options:[["A","严重创伤大量出血"],["B","大汗、大吐、大泻"],["C","情志过激"],["D","饮食劳倦"],["E","外感六淫"]],
      answer:["B"], tag:"气随血脱 vs 气随津脱 辨析",
      explain:"气随津脱由津液大量丢失（大汗大吐大泻）引起，气失津液的承载而随之外泄。", variant:true },
    { id:"v12b", ch:"jingqi", type:"A1", stem:'引起"气随血脱"的常见病因是：',
      options:[["A","大汗不止"],["B","呕吐腹泻过度"],["C","严重创伤、大量出血"],["D","久病耗气"],["E","劳倦过度"]],
      answer:["C"], tag:"气随血脱 vs 气随津脱 辨析",
      explain:"气随血脱由大量出血引起，血为气之母，血脱则气无所附而随血外脱。", variant:true }
  ];

  var TAG_ORDER = [];
  QUESTIONS.forEach(function (q) { if (TAG_ORDER.indexOf(q.tag) === -1) TAG_ORDER.push(q.tag); });

  var SEED_STATS = {
    "胆为孤府/奇恒之腑属性": {seen:1, correct:1, streak:1},
    "心肾相交（水火既济）": {seen:1, correct:1, streak:1},
    "肝主疏泄": {seen:1, correct:1, streak:1},
    "奇恒之腑范围": {seen:1, correct:1, streak:1},
    "脾主升清/胃主降浊（脾胃升降相因）": {seen:1, correct:1, streak:1},
    "五脏阴阳属性归类": {seen:1, correct:0, streak:0},
    "五行相生治法（益火补土等）脏腑指向": {seen:1, correct:0, streak:0},
    "五行相乘（木乘土/土虚木乘）": {seen:1, correct:1, streak:1},
    "阴阳相互转化 vs 偏盛偏衰 辨析": {seen:1, correct:1, streak:1},
    "五行传变——见肝之病知肝传脾": {seen:1, correct:1, streak:1},
    "卫气的功能与分布": {seen:1, correct:1, streak:1},
    "气随血脱 vs 气随津脱 辨析": {seen:1, correct:0, streak:0},
    "气的固摄作用（脏器下垂/久泻）": {seen:1, correct:1, streak:1},
    "津的特点（清稀/布散体表）": {seen:1, correct:1, streak:1},
    "宗气的分布与功能": {seen:1, correct:1, streak:1}
  };

  var STORE_KEY = "xijinglu_307_stats_v1";

  function loadStats() {
    try {
      var raw = localStorage.getItem(STORE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    var init = {};
    TAG_ORDER.forEach(function (t) { init[t] = Object.assign({}, SEED_STATS[t] || {seen:0, correct:0, streak:0}); });
    saveStats(init);
    return init;
  }
  function saveStats(s) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch (e) {}
  }
  var stats = loadStats();

  function tagStatus(t) {
    var s = stats[t] || {seen:0, correct:0, streak:0};
    if (s.seen === 0) return "new";
    if (s.streak >= 2) return "mastered";
    if (s.correct > 0) return "partial";
    return "weak";
  }
  function tagAccuracy(t) {
    var s = stats[t] || {seen:0, correct:0};
    if (!s.seen) return null;
    return s.correct / s.seen;
  }

  var content = document.getElementById("content");
  var chapterNav = document.getElementById("chapterNav");
  var currentView = { mode: "chapter", chapterId: CHAPTERS[0].id };

  function renderNav() {
    chapterNav.innerHTML = "";
    CHAPTERS.forEach(function (ch) {
      var tags = QUESTIONS.filter(function (q) { return q.ch === ch.id && !q.variant; })
                           .map(function (q) { return q.tag; });
      var uniqueTags = tags.filter(function (t, i) { return tags.indexOf(t) === i; });
      var mastered = uniqueTags.filter(function (t) { return tagStatus(t) === "mastered"; }).length;
      var worst = uniqueTags.reduce(function (acc, t) {
        var st = tagStatus(t);
        var rank = { weak: 0, partial: 1, mastered: 2, "new": 3 };
        return rank[st] < rank[acc] ? st : acc;
      }, "new");
      var dotClass = worst === "weak" ? "weak" : worst === "partial" ? "partial" : worst === "mastered" ? "mastered" : "";

      var li = document.createElement("li");
      var btn = document.createElement("button");
      btn.className = "nav-btn" + (currentView.mode === "chapter" && currentView.chapterId === ch.id ? " active" : "");
      btn.innerHTML =
        '<span class="dot ' + dotClass + '"></span>' +
        '<span class="label">' + ch.title + '<small>' + ch.subtitle + '</small></span>' +
        '<span class="frac tabular">' + mastered + '/' + uniqueTags.length + '</span>';
      btn.addEventListener("click", function () {
        currentView = { mode: "chapter", chapterId: ch.id };
        render();
      });
      li.appendChild(btn);
      chapterNav.appendChild(li);
    });

    document.getElementById("btnReview").className = "nav-btn" + (currentView.mode === "review" ? " active" : "");
    document.getElementById("btnWeak").className = "nav-btn" + (currentView.mode === "weak" ? " active" : "");
  }

  document.getElementById("btnReview").addEventListener("click", function () {
    currentView = { mode: "review" };
    render();
  });
  document.getElementById("btnWeak").addEventListener("click", function () {
    currentView = { mode: "weak" };
    render();
  });

  function renderMasterySummary() {
    var mastered = TAG_ORDER.filter(function (t) { return tagStatus(t) === "mastered"; }).length;
    document.getElementById("masterySummary").textContent = mastered + " / " + TAG_ORDER.length;
    document.getElementById("masteryBar").style.width = (TAG_ORDER.length ? (mastered / TAG_ORDER.length * 100) : 0) + "%";
  }

  function renderStatsTable() {
    var body = document.getElementById("statsBody");
    body.innerHTML = "";
    TAG_ORDER.forEach(function (t) {
      var s = stats[t] || {seen:0, correct:0, streak:0};
      var acc = tagAccuracy(t);
      var status = tagStatus(t);
      var statusLabel = { mastered: "已掌握", partial: "待巩固", weak: "薄弱", "new": "未测" }[status];
      var tr = document.createElement("tr");
      tr.innerHTML =
        "<td>" + t + "</td>" +
        '<td class="tabular">' + s.seen + "</td>" +
        '<td class="tabular">' + s.correct + "</td>" +
        '<td class="tabular">' + (acc === null ? "—" : Math.round(acc * 100) + "%") + "</td>" +
        '<td><span class="status-pill ' + status + '">' + statusLabel + "</span></td>";
      body.appendChild(tr);
    });
  }

  function optionLetter(pair) { return pair[0]; }
  function optionText(pair) { return pair[1]; }

  function buildQuizCards(questions, container, onAllGraded) {
    var form = document.createElement("div");
    var graded = {};

    questions.forEach(function (q, idx) {
      var card = document.createElement("div");
      card.className = "card q-card";
      var typeChipClass = q.type === "X" ? "chip type-x" : q.type === "A2" ? "chip type-a2" : "chip";
      var typeLabel = q.type === "X" ? "X型 · 多选" : q.type === "A2" ? "A2型 · 病例" : "A1型 · 单选";

      var meta = document.createElement("div");
      meta.className = "quiz-meta";
      meta.innerHTML = "<span class=\"" + typeChipClass + "\">" + typeLabel + "</span>" +
        "<span class=\"chip\">第 " + (idx + 1) + " 题</span>";
      card.appendChild(meta);

      var stem = document.createElement("div");
      stem.className = "stem";
      stem.textContent = (idx + 1) + ". " + q.stem;
      card.appendChild(stem);

      var opts = document.createElement("ul");
      opts.className = "opts";
      var inputType = q.type === "X" ? "checkbox" : "radio";
      var groupName = "grp_" + q.id;

      q.options.forEach(function (pair) {
        var li = document.createElement("li");
        li.className = "opt";
        var input = document.createElement("input");
        input.type = inputType;
        input.name = groupName;
        input.value = optionLetter(pair);
        var label = document.createElement("label");
        label.style.display = "flex";
        label.style.gap = ".5rem";
        label.style.cursor = "pointer";
        label.style.flex = "1";
        var span = document.createElement("span");
        span.textContent = optionLetter(pair) + ". " + optionText(pair);
        var wrapId = q.id + "_" + optionLetter(pair);
        input.id = wrapId;
        var labelFor = document.createElement("label");
        labelFor.setAttribute("for", wrapId);
        labelFor.style.flex = "1";
        labelFor.style.cursor = "pointer";
        labelFor.textContent = optionLetter(pair) + ". " + optionText(pair);
        li.appendChild(input);
        li.appendChild(labelFor);
        li.dataset.key = optionLetter(pair);
        opts.appendChild(li);
      });
      card.appendChild(opts);

      var tagEl = document.createElement("div");
      tagEl.className = "tag";
      tagEl.textContent = "考点：" + q.tag;
      card.appendChild(tagEl);

      var verdict = document.createElement("div");
      verdict.className = "verdict";
      card.appendChild(verdict);

      var explain = document.createElement("div");
      explain.className = "explain";
      explain.textContent = q.explain;
      card.appendChild(explain);

      container.appendChild(card);

      card._grade = function () {
        var checked = Array.prototype.slice.call(opts.querySelectorAll("input:checked")).map(function (i) { return i.value; });
        var isCorrect = checked.length === q.answer.length && checked.every(function (k) { return q.answer.indexOf(k) !== -1; });
        Array.prototype.forEach.call(opts.querySelectorAll(".opt"), function (li) {
          var key = li.dataset.key;
          var input = li.querySelector("input");
          input.disabled = true;
          li.classList.add("locked");
          if (q.answer.indexOf(key) !== -1) li.classList.add("correct");
          else if (checked.indexOf(key) !== -1) li.classList.add("incorrect");
        });
        verdict.textContent = isCorrect ? "✓ 正确" : "✗ 错误 · 正确答案：" + q.answer.join("、");
        verdict.className = "verdict " + (isCorrect ? "right" : "wrong");
        explain.className = "explain show";

        var s = stats[q.tag] || {seen:0, correct:0, streak:0};
        s.seen += 1;
        if (isCorrect) { s.correct += 1; s.streak = (s.streak || 0) + 1; }
        else { s.streak = 0; }
        stats[q.tag] = s;

        return isCorrect;
      };
    });

    var submitBar = document.createElement("div");
    submitBar.className = "actions-row";
    var submitBtn = document.createElement("button");
    submitBtn.className = "btn primary";
    submitBtn.textContent = "提交本轮，查看判分";
    submitBar.appendChild(submitBtn);
    container.appendChild(submitBar);

    submitBtn.addEventListener("click", function () {
      var correctCount = 0;
      var cards = container.querySelectorAll(".q-card");
      cards.forEach(function (c) { if (c._grade()) correctCount++; });
      submitBtn.disabled = true;
      saveStats(stats);
      renderNav();
      renderMasterySummary();
      renderStatsTable();
      if (onAllGraded) onAllGraded(correctCount, questions.length);
    });
  }

  function renderChapter(chId) {
    var ch = CHAPTERS.filter(function (c) { return c.id === chId; })[0];
    content.innerHTML = "";

    var head = document.createElement("div");
    head.className = "card chapter-head";
    head.innerHTML = "<div><h2>" + ch.title + "</h2><p>" + ch.subtitle + "</p></div>";
    content.appendChild(head);

    var notesCard = document.createElement("div");
    notesCard.className = "card";
    notesCard.innerHTML = ch.notes;
    content.appendChild(notesCard);

    var quizWrap = document.createElement("div");
    var startBtn = document.createElement("button");
    startBtn.className = "btn primary";
    startBtn.textContent = "抽查本章 5 题";
    var actionsRow = document.createElement("div");
    actionsRow.className = "actions-row";
    actionsRow.appendChild(startBtn);
    content.appendChild(actionsRow);
    content.appendChild(quizWrap);

    startBtn.addEventListener("click", function () {
      quizWrap.innerHTML = "";
      var pool = QUESTIONS.filter(function (q) { return q.ch === chId && !q.variant; });
      buildQuizCards(pool, quizWrap, function (correct, total) {
        var banner = document.createElement("div");
        banner.className = "score-banner";
        banner.innerHTML = '<span>本轮判分</span><span class="score tabular">' + correct + " / " + total + "</span>";
        quizWrap.insertBefore(banner, quizWrap.firstChild);
      });
      startBtn.disabled = true;
    });
  }

  function renderReview() {
    content.innerHTML = "";
    var head = document.createElement("div");
    head.className = "card chapter-head";
    head.innerHTML = "<div><h2>复盘</h2><p>把未连续答对两次的知识点找出变式题重考，不出原题。</p></div>";
    content.appendChild(head);

    var weakTags = TAG_ORDER.filter(function (t) { return tagStatus(t) !== "mastered"; });
    var pool = QUESTIONS.filter(function (q) { return q.variant && weakTags.indexOf(q.tag) !== -1; });

    if (!pool.length) {
      var empty = document.createElement("div");
      empty.className = "card empty-note";
      empty.textContent = weakTags.length
        ? "以下知识点还没掌握，但暂时没有配套变式题：" + weakTags.join("、") + "。去对话里让我针对性再出几题即可补齐。"
        : "目前所有知识点都已连续答对两次，没有需要复盘的错题，可以直接学下一章了。";
      content.appendChild(empty);
      return;
    }

    var actionsRow = document.createElement("div");
    actionsRow.className = "actions-row";
    var startBtn = document.createElement("button");
    startBtn.className = "btn primary";
    startBtn.textContent = "开始复盘（" + pool.length + " 题）";
    actionsRow.appendChild(startBtn);
    content.appendChild(actionsRow);
    var quizWrap = document.createElement("div");
    content.appendChild(quizWrap);

    startBtn.addEventListener("click", function () {
      quizWrap.innerHTML = "";
      buildQuizCards(pool, quizWrap, function (correct, total) {
        var banner = document.createElement("div");
        banner.className = "score-banner";
        banner.innerHTML = '<span>复盘判分</span><span class="score tabular">' + correct + " / " + total + "</span>";
        quizWrap.insertBefore(banner, quizWrap.firstChild);
      });
      startBtn.disabled = true;
    });
  }

  function renderWeak() {
    content.innerHTML = "";
    var head = document.createElement("div");
    head.className = "card chapter-head";
    head.innerHTML = "<div><h2>弱项</h2><p>按正确率从低到高抽取知识点，优先用变式题，没有变式题时沿用原题。</p></div>";
    content.appendChild(head);

    var withAcc = TAG_ORDER.map(function (t) { return { tag: t, acc: tagAccuracy(t) }; })
                            .filter(function (x) { return x.acc !== null; })
                            .sort(function (a, b) { return a.acc - b.acc; });

    if (!withAcc.length) {
      var empty = document.createElement("div");
      empty.className = "card empty-note";
      empty.textContent = "还没有任何作答记录，先去任意章节抽查几轮再来看弱项统计。";
      content.appendChild(empty);
      return;
    }

    var lowestTags = withAcc.slice(0, 5).map(function (x) { return x.tag; });
    var list = document.createElement("div");
    list.className = "card";
    list.innerHTML = "<h3>本轮聚焦知识点</h3><ul>" +
      lowestTags.map(function (t) {
        var acc = tagAccuracy(t);
        return "<li>" + t + '　<span class="tabular">' + Math.round(acc * 100) + "%</span></li>";
      }).join("") + "</ul>";
    content.appendChild(list);

    var pool = [];
    lowestTags.forEach(function (t) {
      var variants = QUESTIONS.filter(function (q) { return q.tag === t && q.variant; });
      if (variants.length) pool.push(variants[0]);
      else {
        var original = QUESTIONS.filter(function (q) { return q.tag === t && !q.variant; })[0];
        if (original) pool.push(original);
      }
    });

    var actionsRow = document.createElement("div");
    actionsRow.className = "actions-row";
    var startBtn = document.createElement("button");
    startBtn.className = "btn primary";
    startBtn.textContent = "开始弱项特训（" + pool.length + " 题）";
    actionsRow.appendChild(startBtn);
    content.appendChild(actionsRow);
    var quizWrap = document.createElement("div");
    content.appendChild(quizWrap);

    startBtn.addEventListener("click", function () {
      quizWrap.innerHTML = "";
      buildQuizCards(pool, quizWrap, function (correct, total) {
        var banner = document.createElement("div");
        banner.className = "score-banner";
        banner.innerHTML = '<span>弱项特训判分</span><span class="score tabular">' + correct + " / " + total + "</span>";
        quizWrap.insertBefore(banner, quizWrap.firstChild);
      });
      startBtn.disabled = true;
    });
  }

  function render() {
    renderNav();
    renderMasterySummary();
    renderStatsTable();
    if (currentView.mode === "chapter") renderChapter(currentView.chapterId);
    else if (currentView.mode === "review") renderReview();
    else if (currentView.mode === "weak") renderWeak();
  }

  render();
})();
</script>
